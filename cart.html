<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopDemo - カート</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <h1 class="logo"><a href="index.html">ShopDemo</a></h1>
      <nav>
        <a href="cart.html" class="cart-link">
          カート <span class="cart-count" id="cartCount">0</span>
        </a>
      </nav>
    </div>
  </header>

  <main>
    <section class="cart-section">
      <h2 class="section-title">ショッピングカート</h2>
      <div id="cartContent">
        <div class="cart-empty" id="cartEmpty" style="display:none">
          <p>カートに商品がありません。</p>
          <a href="index.html" class="btn btn-primary">商品一覧へ戻る</a>
        </div>
        <div id="cartItems"></div>
        <div class="cart-summary" id="cartSummary" style="display:none">
          <div class="cart-total">
            <span>合計金額：</span>
            <strong id="cartTotal">¥0</strong>
          </div>
          <button class="btn btn-primary" onclick="proceedToCheckout()">レジへ進む</button>
          <a href="index.html" class="btn btn-secondary">買い物を続ける</a>
        </div>
      </div>
    </section>

    <!-- チェックアウトフォーム -->
    <section class="checkout-section" id="checkoutSection" style="display:none">
      <h2 class="section-title">お客様情報</h2>
      <form class="checkout-form" id="checkoutForm" onsubmit="submitOrder(event)">
        <div class="form-group">
          <label for="name">お名前 <span class="required">*</span></label>
          <input type="text" id="name" name="name" required placeholder="山田 太郎">
        </div>
        <div class="form-group">
          <label for="email">メールアドレス <span class="required">*</span></label>
          <input type="email" id="email" name="email" required placeholder="example@email.com">
        </div>
        <div class="form-group">
          <label for="zip">郵便番号 <span class="required">*</span></label>
          <input type="text" id="zip" name="zip" required placeholder="123-4567" pattern="\d{3}-?\d{4}">
        </div>
        <div class="form-group">
          <label for="address">住所 <span class="required">*</span></label>
          <input type="text" id="address" name="address" required placeholder="東京都渋谷区...">
        </div>
        <div class="form-group">
          <label for="card">クレジットカード番号（テスト用） <span class="required">*</span></label>
          <input type="text" id="card" name="card" required placeholder="4242 4242 4242 4242" maxlength="19">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="expiry">有効期限 <span class="required">*</span></label>
            <input type="text" id="expiry" name="expiry" required placeholder="MM/YY" maxlength="5">
          </div>
          <div class="form-group">
            <label for="cvv">CVV <span class="required">*</span></label>
            <input type="text" id="cvv" name="cvv" required placeholder="123" maxlength="3">
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full">注文を確定する</button>
      </form>
    </section>

    <!-- 注文完了 -->
    <section class="complete-section" id="completeSection" style="display:none">
      <div class="complete-box">
        <div class="complete-icon">✓</div>
        <h2>ご注文ありがとうございます！</h2>
        <p>注文番号：<strong id="orderId"></strong></p>
        <p>確認メールを送信しました（テスト）</p>
        <a href="index.html" class="btn btn-primary">トップページへ戻る</a>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2024 ShopDemo</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
